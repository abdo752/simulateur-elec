<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Électrique Pro - Mon Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --panel-gray: #d1d5db;
            --motor-gray: #4a5568;
            --wire-gray: #a0aec0;
            --live-red: #f87171;
        }

        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; }

        /* Animation Rotation Moteur */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .fan-running { animation: rotate 0.5s linear infinite; }

        /* Style des composants */
        .industrial-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
        }

        .wire-v { width: 4px; background: var(--wire-gray); transition: 0.3s; }
        .wire-h { height: 4px; background: var(--wire-gray); transition: 0.3s; }
        .wire-active { background: #ef4444 !important; box-shadow: 0 0 8px #ef4444; }
    </style>
</head>
<body class="p-0 m-0">

    <header class="bg-slate-900 text-white p-6 shadow-2xl flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="bg-yellow-400 p-2 rounded-lg text-slate-900">🔒</div>
            <h1 class="text-xl font-black tracking-tighter uppercase">Laboratoire Virtuel de Maintenance</h1>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-[10px] font-bold bg-red-600 px-3 py-1 rounded">400V AC</span>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto p-6 grid gap-6 lg:grid-cols-3">
        
        <div class="space-y-6">
            <div class="industrial-card p-6 flex flex-col items-center">
                <h3 class="text-sm font-black text-gray-400 uppercase mb-4">Moteur Asynchrone M1</h3>
                <div class="relative w-40 h-40 bg-slate-700 rounded-lg flex items-center justify-center border-4 border-slate-800 shadow-inner">
                    <div class="absolute inset-2 border-2 border-slate-500 rounded flex items-center justify-center">
                        <div id="motor-fan" class="w-24 h-24 text-6xl flex items-center justify-center grayscale opacity-50">⚙️</div>
                    </div>
                    <div id="motor-led" class="absolute top-2 right-2 w-3 h-3 rounded-full bg-gray-600 border border-slate-900"></div>
                </div>
                <div id="motor-status" class="mt-4 font-mono text-xs font-bold text-gray-500 italic">Vitesse: 0 RPM</div>
            </div>

            <div class="industrial-card p-6 grid grid-cols-2 gap-4">
                <div class="flex flex-col items-center gap-2">
                    <span class="text-[10px] font-bold text-red-600">ARRÊT S0</span>
                    <button onmousedown="pressS0()" onmouseup="releaseS0()" class="w-20 h-20 bg-red-600 border-8 border-red-800 rounded-full shadow-lg active:scale-90"></button>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <span class="text-[10px] font-bold text-green-600">MARCHE S1</span>
                    <button onmousedown="pressS1()" onmouseup="releaseS1()" class="w-20 h-20 bg-green-600 border-8 border-green-800 rounded-full shadow-lg active:scale-90"></button>
                </div>
            </div>
        </div>

        <div class="industrial-card p-6">
            <h3 class="text-sm font-black text-gray-400 uppercase mb-8 border-b pb-2 text-center">Puissance (Triphasé)</h3>
            <div class="flex justify-center gap-12 relative py-4">
                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-bold">L1</span>
                    <div id="p-wire-1" class="wire-v h-64"></div>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-bold">L2</span>
                    <div id="p-wire-2" class="wire-v h-64"></div>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-bold">L3</span>
                    <div id="p-wire-3" class="wire-v h-64"></div>
                </div>
                <div id="km1-power-box" class="absolute top-24 w-48 h-16 border-4 border-slate-800 bg-white/80 backdrop-blur flex items-center justify-center font-black text-xl shadow-md">KM1</div>
            </div>
            <div class="mt-4 p-4 bg-gray-50 rounded-lg border border-dashed text-[11px] text-gray-500 italic">
                * Le contacteur KM1 ferme les 3 pôles de puissance simultanément.
            </div>
        </div>

        <div class="industrial-card p-6">
            <h3 class="text-sm font-black text-gray-400 uppercase mb-8 border-b pb-2 text-center">Commande (230V)</h3>
            <div class="flex flex-col items-center">
                <div class="text-[10px] font-bold text-red-500">PHASE</div>
                <div id="c-wire-1" class="wire-v h-8"></div>
                <button onclick="toggleQ1()" id="schem-q1" class="px-4 py-2 border-2 border-gray-400 text-[10px] font-bold bg-white rounded">Q1: OUVERT</button>
                <div id="c-wire-2" class="wire-v h-8"></div>
                <button onclick="toggleF1()" id="schem-f1" class="px-4 py-2 border-2 border-gray-400 text-[10px] font-bold bg-white rounded">F1: OK</button>
                <div id="c-wire-3" class="wire-v h-8"></div>
                
                <div class="flex gap-4 items-center p-3 border-2 border-dashed rounded-lg">
                   <div id="schem-s0" class="p-2 border border-red-300 text-[9px] font-bold bg-white">S0 (NC)</div>
                   <div id="schem-s1" class="p-2 border border-green-300 text-[9px] font-bold bg-white">S1 (NO)</div>
                </div>

                <div id="c-wire-4" class="wire-v h-10"></div>
                <div id="schem-km1-coil" class="w-20 h-10 border-4 border-slate-800 flex items-center justify-center font-black text-sm bg-white">KM1 (A1-A2)</div>
                <div id="c-wire-5" class="wire-v h-8"></div>
                <div class="text-[10px] font-bold text-blue-500">NEUTRE</div>
            </div>
        </div>

    </main>

    <script>
        let q1 = false, f1 = false, km1 = false, s1 = false, s0 = false;

        function update() {
            // Logique de maintien
            if (q1 && !f1 && (s1 || km1) && !s0) km1 = true; else km1 = false;

            // --- ANIMATION MOTEUR ---
            const fan = document.getElementById('motor-fan');
            const status = document.getElementById('motor-status');
            const led = document.getElementById('motor-led');
            
            if (km1) {
                fan.classList.add('fan-running');
                fan.classList.remove('grayscale');
                status.innerText = "Vitesse: 1450 RPM";
                status.classList.add('text-green-600');
                led.classList.add('bg-green-400', 'shadow-[0_0_10px_#4ade80]');
            } else {
                fan.classList.remove('fan-running');
                fan.classList.add('grayscale');
                status.innerText = "Vitesse: 0 RPM";
                status.classList.remove('text-green-600');
                led.classList.remove('bg-green-400', 'shadow-[0_0_10px_#4ade80]');
            }

            // --- MISE À JOUR SCHÉMAS ---
            // Puissance
            const pWires = ['p-wire-1', 'p-wire-2', 'p-wire-3'];
            pWires.forEach(id => {
                document.getElementById(id).className = km1 ? "wire-v h-64 wire-active" : "wire-v h-64";
            });
            document.getElementById('km1-power-box').className = km1 ? 
                "absolute top-24 w-48 h-16 border-4 border-green-600 bg-green-50 flex items-center justify-center font-black text-xl shadow-lg text-green-700 transition-all" : 
                "absolute top-24 w-48 h-16 border-4 border-slate-800 bg-white/80 flex items-center justify-center font-black text-xl shadow-md";

            // Commande
            const cWires = ['c-wire-1', 'c-wire-2', 'c-wire-3', 'c-wire-4', 'c-wire-5'];
            if(q1 && !f1) {
                document.getElementById('c-wire-1').classList.add('wire-active');
                document.getElementById('c-wire-2').classList.add('wire-active');
                if(km1) cWires.forEach(id => document.getElementById(id).classList.add('wire-active'));
            } else {
                cWires.forEach(id => document.getElementById(id).classList.remove('wire-active'));
            }

            // Boutons Schéma
            document.getElementById('schem-q1').innerText = q1 ? "Q1: FERMÉ" : "Q1: OUVERT";
            document.getElementById('schem-q1').className = q1 ? "px-4 py-2 border-2 border-green-500 text-[10px] font-bold bg-green-50 text-green-700 rounded" : "px-4 py-2 border-2 border-gray-400 text-[10px] font-bold bg-white rounded";
            
            document.getElementById('schem-f1').innerText = f1 ? "F1: DÉFAUT" : "F1: OK";
            document.getElementById('schem-f1').className = f1 ? "px-4 py-2 border-2 border-red-500 text-[10px] font-bold bg-red-50 text-red-700 rounded animate-bounce" : "px-4 py-2 border-2 border-gray-400 text-[10px] font-bold bg-white rounded";

            document.getElementById('schem-km1-coil').className = km1 ? "w-20 h-10 border-4 border-green-600 flex items-center justify-center font-black text-sm bg-green-600 text-white shadow-lg scale-110 transition-all" : "w-20 h-10 border-4 border-slate-800 flex items-center justify-center font-black text-sm bg-white";
        }

        function toggleQ1() { q1 = !q1; update(); }
        function toggleF1() { f1 = !f1; update(); }
        function pressS1() { s1 = true; update(); }
        function releaseS1() { s1 = false; update(); }
        function pressS0() { s0 = true; update(); }
        function releaseS0() { s0 = false; update(); }
    </script>
</body>
</html>
