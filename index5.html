<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuMaintenix V5 | Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-size: 14px; overflow-x: hidden; }
        .app-header { background: #1a237e; color: white; padding: 10px; border-radius: 0 0 15px 15px; }
        .schematic-card { background: white; border-radius: 12px; border: 1px solid #d1d9e6; margin-top: 10px; position: relative; }
        
        /* Zone du Schéma SVG */
        .svg-container { width: 100%; height: 350px; display: flex; justify-content: center; padding: 10px; }
        .line { stroke: #2c3e50; stroke-width: 2.5; fill: none; }
        .comp-label { font-size: 14px; font-weight: bold; fill: #1a237e; font-family: sans-serif; }
        
        /* Points de test (Cliquables) */
        .tp { fill: #ff1744; stroke: white; stroke-width: 2; cursor: pointer; transition: 0.2s; opacity: 0.8; }
        .tp:active { fill: #ffeb3b; r: 10; opacity: 1; }

        /* Terminal et Mesure */
        .console { background: #212121; color: #00e676; font-family: 'Courier New', monospace; padding: 8px; border-radius: 8px; font-size: 11px; height: 90px; overflow-y: auto; }
        .volt-display { background: #000; color: #ffeb3b; border: 2px solid #37474f; border-radius: 8px; padding: 10px; font-weight: bold; text-align: center; box-shadow: inset 0 0 10px rgba(255,235,59,0.2); }
    </style>
</head>
<body class="p-2">

    <div class="app-header d-flex justify-content-between align-items-center shadow">
        <span class="fw-bold"><i class="fas fa-bolt me-1"></i> SIMU-ELEC V5</span>
        <button class="btn btn-danger btn-sm" id="btn-au">URGENCE</button>
    </div>

    <div class="schematic-card shadow-sm">
        <div class="svg-container">
            <svg viewBox="0 0 200 320" height="100%" xmlns="http://www.w3.org/2000/svg">
                <line x1="100" y1="10" x2="100" y2="300" class="line" />
                
                <rect x="80" y="40" width="40" height="40" fill="white" stroke="#2c3e50" stroke-width="2"/>
                <line x1="85" y1="50" x2="115" y2="70" class="line" />
                <text x="130" y="65" class="comp-label">Q1</text>
                <circle cx="100" cy="85" r="7" class="tp" onclick="check(400, 'Sortie Q1')"/>

                <rect x="80" y="110" width="40" height="40" fill="white" stroke="#2c3e50" stroke-width="2"/>
                <line x1="80" y1="130" x2="120" y2="130" stroke="#2c3e50" stroke-width="2" stroke-dasharray="4"/>
                <text x="130" y="135" class="comp-label">KM1</text>
                <circle cx="100" cy="155" r="7" class="tp" onclick="check(400, 'Sortie KM1')"/>

                <path d="M 85 190 L 115 190 L 100 220 Z" fill="#e3f2fd" stroke="#2c3e50" stroke-width="2"/>
                <text x="130" y="210" class="comp-label">F1</text>
                <circle cx="100" cy="225" r="7" class="tp" onclick="check(400, 'Sortie F1')"/>

                <circle cx="100" cy="270" r="28" fill="#cfd8dc" stroke="#2c3e50" stroke-width="2"/>
                <text x="100" y="275" text-anchor="middle" class="comp-label" style="font-size: 12px;">MOTEUR</text>
                <circle cx="100" cy="270" r="5" class="tp" onclick="check(400, 'Bornier M1')"/>
            </svg>
        </div>
    </div>

    <div class="mt-3">
        <div class="row g-2">
            <div class="col-12">
                <div class="volt-display">
                    <small style="font-size: 10px; color: #90a4ae; display: block;">LECTURE MULTIMÈTRE</small>
                    <span id="volt-val" style="font-size: 2rem;">0.0</span> <span style="font-size: 1rem;">V</span>
                </div>
            </div>
            <div class="col-12">
                <div class="console" id="log-box">
                    > Système initialisé.<br>
                    > En attente de mesure...
                </div>
            </div>
        </div>
    </div>

    <script>
        let powerOff = false;
        const display = document.getElementById('volt-val');
        const logs = document.getElementById('log-box');

        function check(val, point) {
            if(powerOff) {
                display.innerText = "0.0";
                logs.innerHTML = `<span style="color:red">> [!] Erreur: Coupure AU active.</span><br>` + logs.innerHTML;
                return;
            }
            // Variation légère pour le réalisme
            let noise = (val + (Math.random() * 4 - 2)).toFixed(1);
            display.innerText = noise;
            logs.innerHTML = `> Mesure sur ${point}: ${noise}V (OK)<br>` + logs.innerHTML;
        }

        document.getElementById('btn-au').addEventListener('click', function() {
            powerOff = true;
            display.innerText = "0.0";
            this.innerText = "COUPÉ";
            this.className = "btn btn-secondary btn-sm";
            logs.innerHTML = `<span style="color:red">> [ALERTE] ARRÊT D'URGENCE ACTIVÉ.</span><br>` + logs.innerHTML;
        });
    </script>
</body>
</html>
