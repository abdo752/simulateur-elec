<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuMaintenix Formation V6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-size: 14px; }
        .app-header { background: #004d40; color: white; padding: 10px; border-radius: 0 0 10px 10px; }
        .schematic-card { background: white; border: 1px solid #cfd8dc; border-radius: 12px; height: 350px; position: relative; }
        
        /* Animation du moteur */
        @keyframes vibrate {
            0% { transform: translate(0,0); }
            25% { transform: translate(1px,1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(0,0); }
        }
        .motor-running { fill: #4caf50 !important; animation: vibrate 0.1s infinite; }
        
        /* Points de test */
        .tp { fill: #f44336; stroke: white; stroke-width: 2; cursor: pointer; opacity: 0.7; }
        .tp:hover { opacity: 1; r: 9; }

        .volt-screen { background: #000; color: #00ff41; border-radius: 8px; padding: 15px; text-align: center; border: 3px solid #455a64; }
        .console { background: #1e1e1e; color: #cfd8dc; font-family: monospace; font-size: 11px; height: 80px; overflow-y: auto; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body class="p-2">

    <div class="app-header d-flex justify-content-between align-items-center shadow-sm">
        <span class="fw-bold"><i class="fas fa-graduation-cap me-1"></i> MODE FORMATION</span>
        <div>
            <button class="btn btn-warning btn-sm fw-bold" onclick="generateFault()">PANNE</button>
            <button class="btn btn-danger btn-sm ms-1" id="btn-au">AU</button>
        </div>
    </div>

    <div class="schematic-card mt-2 shadow-sm d-flex justify-content-center">
        <svg viewBox="0 0 200 320" height="100%" xmlns="http://www.w3.org/2000/svg">
            <line x1="100" y1="10" x2="100" y2="250" stroke="#37474f" stroke-width="3" />
            
            <rect x="80" y="40" width="40" height="40" fill="white" stroke="#37474f" stroke-width="2"/>
            <line x1="85" y1="50" x2="115" y2="70" stroke="#37474f" stroke-width="2"/>
            <text x="130" y="65" font-weight="bold">Q1</text>
            <circle cx="100" cy="85" r="7" class="tp" onclick="measure(400, 'Q1')"/>

            <rect x="80" y="110" width="40" height="40" fill="white" stroke="#37474f" stroke-width="2"/>
            <line x1="80" y1="130" x2="120" y2="130" stroke="#37474f" stroke-width="2" stroke-dasharray="4"/>
            <text x="130" y="135" font-weight="bold">KM1</text>
            <circle cx="100" cy="155" r="7" class="tp" onclick="measure(400, 'KM1')"/>

            <path d="M 85 190 L 115 190 L 100 220 Z" fill="white" stroke="#37474f" stroke-width="2"/>
            <text x="130" y="210" font-weight="bold">F1</text>
            <circle cx="100" cy="225" r="7" class="tp" onclick="measure(400, 'F1')"/>

            <circle id="motor-circle" cx="100" cy="275" r="28" fill="#eceff1" stroke="#37474f" stroke-width="2"/>
            <text x="100" y="280" text-anchor="middle" font-weight="bold">M1</text>
        </svg>
    </div>

    <div class="mt-3">
        <div class="volt-screen shadow mb-2">
            <span id="volt-val" style="font-size: 2.2rem; font-family: 'Digital-7', monospace;">0.0</span> <small>V AC</small>
        </div>
        
        <div class="console mb-2" id="logs">
            > Prêt. Cliquez sur "PANNE" pour commencer l'exercice.
        </div>

        <div class="d-grid gap-2">
            <button class="btn btn-success btn-sm" onclick="repair()">VÉRIFIER / RÉPARER</button>
        </div>
    </div>

    <script>
        let isAU = false;
        let activeFault = null;
        const logs = document.getElementById('logs');
        const display = document.getElementById('volt-val');
        const motor = document.getElementById('motor-circle');

        const scenarios = [
            { id: 'Q1', msg: 'Q1 est resté ouvert.', vQ1: 0, vKM1: 0, vF1: 0 },
            { id: 'KM1', msg: 'KM1 : Bobine grillée, contacts ouverts.', vQ1: 400, vKM1: 0, vF1: 0 },
            { id: 'F1', msg: 'F1 : Relais thermique déclenché.', vQ1: 400, vKM1: 400, vF1: 0 }
        ];

        function addLog(txt, color='white') {
            logs.innerHTML = `<span style="color:${color}">> ${txt}</span><br>` + logs.innerHTML;
        }

        function generateFault() {
            isAU = false;
            activeFault = scenarios[Math.floor(Math.random() * scenarios.length)];
            motor.classList.remove('motor-running');
            addLog("EXERCICE : Le moteur ne tourne plus. Trouvez la panne !", "#ffeb3b");
            display.innerText = "0.0";
        }

        function measure(val, point) {
            if(isAU) { addLog("ERREUR : AU enclenché", "red"); display.innerText="0.0"; return; }
            
            let voltage = val;
            if(activeFault) {
                if(point === 'Q1') voltage = activeFault.vQ1;
                if(point === 'KM1') voltage = activeFault.vKM1;
                if(point === 'F1') voltage = activeFault.vF1;
            }

            let noise = voltage > 0 ? (voltage + Math.random()*5).toFixed(1) : "0.0";
            display.innerText = noise;
            addLog(`Mesure sortie ${point} : ${noise}V`);
            
            if(!activeFault && voltage > 0 && point === 'F1') motor.classList.add('motor-running');
        }

        function repair() {
            if(!activeFault) { addLog("Aucune panne détectée."); return; }
            let choice = prompt("Quel composant est en panne ? (Q1, KM1 ou F1)").toUpperCase();
            if(choice === activeFault.id) {
                addLog(`BRAVO ! C'était bien ${activeFault.id}. Panne réparée.`, "#4caf50");
                activeFault = null;
                motor.classList.add('motor-running');
            } else {
                addLog(`ÉCHEC : ${choice} n'est pas la source du problème.`, "#f44336");
            }
        }

        document.getElementById('btn-au').addEventListener('click', () => {
            isAU = true;
            motor.classList.remove('motor-running');
            addLog("ARRÊT D'URGENCE !", "red");
        });
    </script>
</body>
</html>
